<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certus · Menú desplegable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:#E7E0D0;font-family:'Inter',sans-serif;}
    #root{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px 20px;}
    .cap{font-size:12.5px;color:#857A6C;text-align:center;display:flex;align-items:center;gap:8px;}
    .cap b{color:#3B362F;font-weight:700;}
    .dot{width:5px;height:5px;border-radius:50%;background:#B08D4F;}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" data-presets="react">
    const { useState } = React
    const A = {
      bg:'#F1EBDE', card:'#FBF8F0', sunk:'#ECE4D4', scrim:'rgba(48,43,37,.34)',
      ink:'#3B362F', sub:'#857A6C', faint:'#B3A899',
      line:'#E4DACA', lineSoft:'#EFE8DA',
      laurel:'#7E9A77', laurelDk:'#566F50', laurelTint:'#E3EEDD',
      terra:'#C2664F', ochre:'#B08D4F', ochreTint:'#F6ECD6',
      display:"'Montserrat',sans-serif", body:"'Inter',sans-serif",
    }

    // Puntuación derivada de los datos reales de cada examen (sus áreas)
    function scoreFor(ex) {
      const answered = ex.areas.reduce((s,a)=>s+a.total,0)
      const correct  = ex.areas.reduce((s,a)=>s+a.correct,0)
      const acc = Math.round(correct/answered*100)
      const level = acc>=65 ? 'Avanzado' : acc>=40 ? 'Intermedio' : 'Inicial'
      return { acc, answered, correct, level }
    }
    const STREAK = 12

    function Ring({ pct, color, size=58, sw=5, track=A.sunk }) {
      const r=(size-sw)/2, c=2*Math.PI*r
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:'rotate(-90deg)'}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={sw}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round"
            strokeDasharray={c} strokeDashoffset={c*(1-pct/100)} style={{transition:'stroke-dashoffset .5s ease'}}/>
        </svg>
      )
    }

    function Toggle({ on, onClick }) {
      return (
        <button onClick={onClick} style={{ width:42, height:25, borderRadius:999, border:'none', cursor:'pointer',
          background: on ? A.laurel : A.sunk, position:'relative', transition:'background .2s', flexShrink:0 }}>
          <span style={{ position:'absolute', top:3, left: on?20:3, width:19, height:19, borderRadius:'50%', background:'#fff',
            boxShadow:'0 1px 3px rgba(0,0,0,.2)', transition:'left .2s' }}/>
        </button>
      )
    }

    const Eyebrow = ({children,color=A.faint}) => (
      <p style={{fontSize:10.5,fontWeight:700,letterSpacing:'.16em',textTransform:'uppercase',color}}>{children}</p>
    )

    function ExamRow({ ex, active, onClick }) {
      const Icon = ICONS[ex.id]
      return (
        <button onClick={onClick} style={{ width:'100%', textAlign:'left', cursor:'pointer',
          display:'flex', alignItems:'center', gap:12, padding:'11px 12px', borderRadius:14,
          background: active ? A.laurelTint : 'transparent', border:`1.5px solid ${active ? A.laurel : 'transparent'}`,
          transition:'background .15s' }}>
          <div style={{ width:38, height:38, borderRadius:11, background: active ? '#fff' : A.sunk,
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <Icon size={20} stroke={active ? A.laurelDk : A.sub} sw={1.6}/>
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <p style={{ fontFamily:A.display, fontSize:14.5, fontWeight:700, color: active ? A.laurelDk : A.ink, letterSpacing:'-.01em' }}>{ex.name}</p>
            <p style={{ fontSize:11, color:A.sub, marginTop:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{ex.short}</p>
          </div>
          {active
            ? <span style={{ width:22, height:22, borderRadius:'50%', background:A.laurel, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><IconCheck size={13} stroke="#fff"/></span>
            : <span style={{ fontFamily:A.display, fontSize:13, fontWeight:700, color:A.faint }}>{ex.pct}%</span>}
        </button>
      )
    }

    function SettingRow({ icon, label, sub, right }) {
      return (
        <div style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 12px' }}>
          <div style={{ width:34, height:34, borderRadius:10, background:A.sunk, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, color:A.laurelDk }}>{icon}</div>
          <div style={{ flex:1, minWidth:0 }}>
            <p style={{ fontSize:13, fontWeight:600, color:A.ink }}>{label}</p>
            {sub && <p style={{ fontSize:10.5, color:A.sub, marginTop:1 }}>{sub}</p>}
          </div>
          {right}
        </div>
      )
    }

    function App() {
      const [open, setOpen] = useState(true)
      const [activeId, setActiveId] = useState('exani2')
      const [notif, setNotif] = useState(true)
      const [tutor, setTutor] = useState(true)
      const [goal, setGoal] = useState(20)
      const ex = EXAMS.find(e => e.id === activeId)
      const sc = scoreFor(ex)

      return (
        <>
        <div style={{ width:340, height:724, background:A.bg, borderRadius:34, overflow:'hidden',
          fontFamily:A.body, color:A.ink, position:'relative', boxShadow:'0 30px 60px -30px rgba(48,43,37,.5), 0 0 0 1px rgba(48,43,37,.05)' }}>
          <StatusBar color={A.ink}/>

          {/* Header / switcher (always visible, above everything) */}
          <div style={{ position:'relative', zIndex:30, padding:'8px 18px 12px', background:A.bg }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>setOpen(o=>!o)} style={{ flex:1, display:'flex', alignItems:'center', gap:11, cursor:'pointer',
                background:A.card, border:`1px solid ${A.line}`, borderRadius:15, padding:'9px 12px', textAlign:'left' }}>
                <div style={{ width:34, height:34, borderRadius:10, background:A.laurelTint, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  {React.createElement(ICONS[ex.id], { size:18, stroke:A.laurelDk, sw:1.6 })}
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:9.5, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:A.ochre }}>Estudiando</p>
                  <p style={{ fontFamily:A.display, fontSize:15, fontWeight:800, letterSpacing:'-.01em', marginTop:1 }}>{ex.name}</p>
                </div>
                <span style={{ display:'flex', color:A.sub, transition:'transform .25s', transform: open?'rotate(180deg)':'none' }}><IconChevron size={20} stroke={A.sub}/></span>
              </button>
              <div style={{ display:'flex', alignItems:'center', gap:5, padding:'9px 12px', borderRadius:13, background:A.ochreTint, alignSelf:'stretch' }}>
                <IconFlame size={16} stroke={A.ochre} fill="#F2DFB4" sw={1.5}/>
                <span style={{ fontSize:14, fontWeight:800, color:A.ochre }}>{STREAK}</span>
              </div>
            </div>
          </div>

          {/* Home content behind */}
          <div style={{ padding:'4px 20px 18px', filter: open?'blur(1.5px)':'none', transition:'filter .25s' }}>
            <h1 style={{ fontFamily:A.display, fontSize:24, fontWeight:800, letterSpacing:'-.02em', lineHeight:1.1, marginTop:6 }}>Buen día,<br/>Mariana.</h1>
            <p style={{ fontSize:12.5, color:A.sub, marginTop:8 }}>Continúa con <strong style={{color:A.ink}}>Comprensión Lectora</strong></p>
            <div style={{ marginTop:16, display:'flex', flexDirection:'column', gap:11 }}>
              {ex.areas.slice(0,3).map(a=>{
                const Icon = ICONS[a.id]
                return (
                  <div key={a.id} style={{ display:'flex', alignItems:'center', gap:12, background:A.card, border:`1px solid ${A.line}`, borderRadius:15, padding:'13px 14px' }}>
                    <div style={{ width:38, height:38, borderRadius:11, background:ex.tint, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      <Icon size={20} stroke={ex.color} sw={1.6}/>
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <p style={{ fontSize:13, fontWeight:700 }}>{a.name}</p>
                      <div style={{ marginTop:8, height:5, borderRadius:5, background:A.sunk, overflow:'hidden' }}>
                        <div style={{ height:'100%', width:`${a.pct}%`, background:ex.color, borderRadius:5 }}/>
                      </div>
                    </div>
                    <span style={{ fontFamily:A.display, fontSize:13, fontWeight:800, color:ex.color }}>{a.pct}%</span>
                  </div>
                )
              })}
            </div>
          </div>

          {/* Scrim */}
          {open && <div onClick={()=>setOpen(false)} style={{ position:'absolute', inset:0, zIndex:20, background:A.scrim, transition:'opacity .25s' }}/>}

          {/* Dropdown panel */}
          <div style={{ position:'absolute', left:8, right:8, top:118, zIndex:25,
            transform: open?'translateY(0)':'translateY(-118%)', opacity: open?1:0,
            transition:'transform .32s cubic-bezier(.22,1,.36,1), opacity .22s',
            pointerEvents: open?'auto':'none' }}>
            <div style={{ background:A.card, borderRadius:22, border:`1px solid ${A.line}`,
              boxShadow:'0 24px 48px -24px rgba(48,43,37,.55)', overflow:'hidden', maxHeight:560, display:'flex', flexDirection:'column' }}>
              <div style={{ overflowY:'auto', padding:'16px 14px 16px' }}>

                {/* Exam selector */}
                <div style={{ padding:'0 4px 8px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <Eyebrow>Examen</Eyebrow>
                  <span style={{ fontSize:10.5, color:A.faint }}>3 disponibles</span>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                  {EXAMS.map(e => <ExamRow key={e.id} ex={e} active={e.id===activeId} onClick={()=>setActiveId(e.id)}/>)}
                </div>

                <div style={{ height:1, background:A.lineSoft, margin:'14px 4px' }}/>

                {/* Score */}
                <div style={{ padding:'0 4px 10px', display:'flex', alignItems:'center', gap:8 }}>
                  <Eyebrow>Mi puntuación</Eyebrow>
                  <span style={{ fontSize:9.5, fontWeight:800, letterSpacing:'.02em', color:ex.color, background:ex.tint, padding:'2px 8px', borderRadius:999 }}>{ex.name}</span>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:14, padding:'4px 6px 6px' }}>
                  <div style={{ position:'relative', display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <Ring pct={sc.acc} color={ex.color}/>
                    <span style={{ position:'absolute', fontFamily:A.display, fontSize:15, fontWeight:800, color:ex.color }}>{sc.acc}<span style={{fontSize:9}}>%</span></span>
                  </div>
                  <div style={{ flex:1, display:'flex', gap:8 }}>
                    {[
                      {l:'Respondidas', v:sc.answered, c:A.ink},
                      {l:'Correctas', v:sc.correct, c:ex.color},
                      {l:'Nivel', v:sc.level, c:A.ochre, small:true},
                    ].map(s=>(
                      <div key={s.l} style={{ flex:1, background:A.bg, borderRadius:12, padding:'10px 6px', textAlign:'center' }}>
                        <p style={{ fontFamily:A.display, fontSize: s.small?12:18, fontWeight:800, color:s.c, lineHeight:1.1 }}>{s.v}</p>
                        <p style={{ fontSize:9, color:A.sub, marginTop:3 }}>{s.l}</p>
                      </div>
                    ))}
                  </div>
                </div>
                {/* Per-area breakdown — ties score to this exam's areas */}
                <div style={{ marginTop:8, padding:'10px 12px', background:A.bg, borderRadius:13, display:'flex', flexDirection:'column', gap:9 }}>
                  {ex.areas.map(a=>{
                    const Icon = ICONS[a.id]
                    return (
                      <div key={a.id} style={{ display:'flex', alignItems:'center', gap:9 }}>
                        <Icon size={15} stroke={ex.color} sw={1.6}/>
                        <span style={{ flex:1, minWidth:0, fontSize:11, fontWeight:600, color:A.sub, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{a.name}</span>
                        <div style={{ width:64, height:5, borderRadius:5, background:A.sunk, overflow:'hidden', flexShrink:0 }}>
                          <div style={{ height:'100%', width:`${a.pct}%`, background:ex.color, borderRadius:5 }}/>
                        </div>
                        <span style={{ fontFamily:A.display, fontSize:11, fontWeight:800, color:ex.color, width:30, textAlign:'right', flexShrink:0 }}>{a.pct}%</span>
                      </div>
                    )
                  })}
                </div>

                <div style={{ height:1, background:A.lineSoft, margin:'14px 4px' }}/>

                {/* Settings */}
                <div style={{ padding:'0 4px 4px' }}><Eyebrow>Ajustes</Eyebrow></div>
                <SettingRow icon={<IconTarget size={18} stroke={A.laurelDk} sw={1.6}/>} label="Meta diaria" sub={`${goal} preguntas al día`}
                  right={
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <button onClick={()=>setGoal(g=>Math.max(5,g-5))} style={{ width:26, height:26, borderRadius:8, border:`1px solid ${A.line}`, background:A.bg, color:A.sub, fontSize:16, fontWeight:700, cursor:'pointer', lineHeight:1 }}>–</button>
                      <span style={{ fontFamily:A.display, fontSize:14, fontWeight:800, color:A.ink, width:22, textAlign:'center' }}>{goal}</span>
                      <button onClick={()=>setGoal(g=>Math.min(60,g+5))} style={{ width:26, height:26, borderRadius:8, border:`1px solid ${A.line}`, background:A.bg, color:A.sub, fontSize:15, fontWeight:700, cursor:'pointer', lineHeight:1 }}>+</button>
                    </div>
                  }/>
                <SettingRow icon={<IconBell size={18} stroke={A.laurelDk} sw={1.6}/>} label="Recordatorios" sub="Aviso diario de estudio"
                  right={<Toggle on={notif} onClick={()=>setNotif(v=>!v)}/>}/>
                <SettingRow icon={<IconSpark size={18} stroke={A.laurelDk} sw={1.6}/>} label="Tutor IA" sub="Explicaciones ampliadas"
                  right={<Toggle on={tutor} onClick={()=>setTutor(v=>!v)}/>}/>
                <SettingRow icon={<IconSliders size={18} stroke={A.laurelDk} sw={1.6}/>} label="Preferencias" sub="Idioma, tema, cuenta"
                  right={<span style={{ display:'flex', color:A.faint, transform:'rotate(-90deg)' }}><IconChevron size={18} stroke={A.faint}/></span>}/>

                <button style={{ width:'100%', marginTop:8, display:'flex', alignItems:'center', justifyContent:'center', gap:8,
                  padding:'12px', borderRadius:13, background:'transparent', border:`1.5px solid ${A.line}`, color:A.terra,
                  fontFamily:A.display, fontWeight:700, fontSize:13, cursor:'pointer' }}>
                  <IconLogout size={17} stroke={A.terra}/> Cerrar sesión
                </button>
              </div>
            </div>
          </div>
        </div>

        <p className="cap"><span className="dot"></span> Toca el encabezado <b>Estudiando · {ex.name}</b> para abrir o cerrar el menú</p>
        </>
      )
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
  </script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#7E9A77"/>
      <g fill="none" stroke="#FBF8F0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <rect x="28" y="26" width="44" height="30" rx="6" fill="#FBF8F0" stroke="none"/>
        <path d="M40 68l10 10 10-10" stroke="#FBF8F0"/>
      </g>
    </svg>
  </template>
</body>
</html>
